name: Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Tag und Paketversion prüfen
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          if ($env:GITHUB_REF_NAME -ne "v$packageVersion") {
            throw "Tag $env:GITHUB_REF_NAME passt nicht zu package.json Version $packageVersion"
          }

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Tests ausführen
        run: npm test

      - name: Installer bauen und GitHub Release veröffentlichen
        run: npm run dist:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
