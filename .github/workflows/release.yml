name: Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Tag und Paketversion prüfen
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          if ($env:GITHUB_REF_NAME -ne "v$packageVersion") {
            throw "Tag $env:GITHUB_REF_NAME passt nicht zu package.json Version $packageVersion"
          }

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Tests ausführen
        run: npm test

      - name: Installer bauen und GitHub Release veröffentlichen
        run: npm run dist:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update-Dateien vollständig veröffentlichen
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $installer = "release/ProjectBuilder Setup $version.exe"
          $blockmap = "$installer.blockmap"
          $installerTarget = "release/ProjectBuilder-Setup-$version.exe"
          $blockmapTarget = "$installerTarget.blockmap"

          Copy-Item -LiteralPath $installer -Destination $installerTarget -Force
          Copy-Item -LiteralPath $blockmap -Destination $blockmapTarget -Force

          gh release upload $env:GITHUB_REF_NAME `
            $installerTarget `
            $blockmapTarget `
            "release/latest.yml" `
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
